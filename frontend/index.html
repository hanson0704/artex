<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Exhibition Query Interface</title>

    <!-- Link CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🎨 Art Exhibition Query Interface</h1>
            <p>Explore artworks, artists, galleries, and more with interactive queries</p>
        </div>

        <div class="main-content">
            <!-- Left Panel -->
            <div class="queries-panel">
                <button class="query-button" onclick="showInsertPanel()">
                    ➕ Insert New Record
                </button>
                <button class="query-button" onclick="showDeletePanel()">
                    🗑 Delete Record
                </button>



                <h2>📋 Available Queries</h2>

                <button class="query-button" onclick="executeQuery(1)">
                    <span class="query-number">Q1</span> List artworks that were auctioned
                </button>
                <button class="query-button" onclick="executeQuery(2)">
                    <span class="query-number">Q2</span> Find the artist whose artwork sold for the highest price
                </button>
                <button class="query-button" onclick="executeQuery(3)">
                    <span class="query-number">Q3</span> Show critics who reviewed more than 10 artworks
                </button>
                <button class="query-button" onclick="executeQuery(4)">
                    <span class="query-number">Q4</span> Calculate the average rating per gallery section
                </button>
                <button class="query-button" onclick="executeQuery(5)">
                    <span class="query-number">Q5</span> Identify themes with max artworks
                </button>
                <button class="query-button" onclick="executeQuery(6)">
                    <span class="query-number">Q6</span> Retrieve visitors who purchased more than 2 artworks
                </button>
                <button class="query-button" onclick="executeQuery(7)">
                    <span class="query-number">Q7</span> Artworks reviewed by both critics and visitors
                </button>
                <button class="query-button" onclick="executeQuery(8)">
                    <span class="query-number">Q8</span> Artists who displayed works in multiple galleries
                </button>
                <button class="query-button" onclick="executeQuery(9)">
                    <span class="query-number">Q9</span> Artworks not sold or auctioned
                </button>
                <button class="query-button" onclick="executeQuery(10)">
                    <span class="query-number">Q10</span> Most expensive sculpture
                </button>
                <button class="query-button" onclick="executeQuery(11)">
                    <span class="query-number">Q11</span> Galleries with most paintings
                </button>
                <button class="query-button" onclick="executeQuery(12)">
                    <span class="query-number">Q12</span> Top 3 highest-rated artists
                </button>
            </div>

            <!-- Results Panel -->
            <div class="results-panel">
                <div class="results-header">
                    <h2 id="resultsTitle">Query Results</h2>
                    <span class="result-count" id="resultCount">0 results</span>
                </div>

                <div id="resultsContent">
                    <div class="no-results">
                        👈 Click a query button to see results
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- INSERT POPUP MODAL -->
    <div id="insertModal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <span class="close-button" onclick="closeInsertModal()">&times;</span>

            <h2>➕ Insert New Record</h2>

            <label>Select Collection:</label>
            <select id="collectionSelect" onchange="loadInsertFields()" class="modal-input">
                <option value="">-- Select Collection --</option>
                <option value="artists">Artists</option>
                <option value="artworks">Artworks</option>
                <option value="galleries">Galleries</option>
                <option value="critics">Critics</option>
                <option value="visitors">Visitors</option>
                <option value="reviews">Reviews</option>
                <option value="auctions">Auctions</option>
                <option value="purchases">Purchases</option>
            </select>

            <div class="modal-body">
                <form id="insertForm"></form>
            </div>


            <button class="submit-button" onclick="submitInsert()">✔ Submit</button>
        </div>
    </div>

    <!-- DELETE POPUP MODAL -->
    <div id="deleteModal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <span class="close-button" onclick="closeDeleteModal()">&times;</span>

            <h2 style="color:#d9534f;">🗑 Delete Record</h2>

            <label>Select Collection:</label>
            <select id="deleteCollectionSelect" onchange="loadDeleteField()" class="modal-input">
                <option value="">-- Select Collection --</option>
                <option value="artists">Artists</option>
                <option value="artworks">Artworks</option>
                <option value="galleries">Galleries</option>
                <option value="critics">Critics</option>
                <option value="visitors">Visitors</option>
                <option value="reviews">Reviews</option>
                <option value="auctions">Auctions</option>
                <option value="purchases">Purchases</option>
            </select>

            <div class="modal-body">
                <form id="deleteForm"></form>
            </div>


            <button class="submit-button" style="background:#d9534f;" onclick="submitDelete()">
                🗑 Delete
            </button>
        </div>
    </div>



    <!-- JS file link -->
    <script src="script.js"></script>
</body>

</html>
